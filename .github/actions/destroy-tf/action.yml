name: "Destroy Terraform"
description: "Destroy Terraform resources"
inputs:
  bucket_name:
    description: "Name of the S3 bucket"
    required: true
    type: string
  tfvar_file_path:
    description: "Path to the tfvar file"
    required: true
    type: string
  directory:
    description: "Directory to run Terraform"
    required: true
    type: string
  component:
    description: "Component name"
    required: true
    type: string
  master_s3_directory:
    description: "Name of the master s3 directory"
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: terraform init -backend-config="bucket=${{ inputs.bucket_name }}" -backend-config="key=${{ inputs.master_s3_directory }}/${{ inputs.component }}/terraform.tfstate"

    - name: Terraform Destroy
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: terraform destroy --auto-approve -var-file="${{ inputs.tfvar_file_path }}"
